version: 2
project_name: wikipedia-pp-cli
changelog:
  disable: true
builds:
  - id: wikipedia-pp-cli
    main: ./cmd/wikipedia-pp-cli
    binary: wikipedia-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X wikipedia-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: wikipedia-pp-mcp
    main: ./cmd/wikipedia-pp-mcp
    binary: wikipedia-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: wikipedia-pp-cli
    repository:
      owner: az9713
      name: homebrew-tap
    homepage: "https://github.com/az9713/wikipedia-pp-cli"
    description: "Every Wikipedia reading pattern as a composable command — with structured output, offline cache, and an..."
    install: |
      bin.install "wikipedia-pp-cli"
      bin.install "wikipedia-pp-mcp"
